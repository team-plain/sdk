      threadId
      createdAt {
        unixTimestamp
        iso8601
      }
      updatedAt {
        unixTimestamp
        iso8601
      }
    }
    ... on CustomerCardInstanceLoaded {
      id
      customerId
      threadId
      loadedAt {
        unixTimestamp
        iso8601
      }
      expiresAt {
        unixTimestamp
        iso8601
      }
      createdAt {
        unixTimestamp
        iso8601
      }
      updatedAt {
        unixTimestamp
        iso8601
      }
    }
    ... on CustomerCardInstanceError {
      id
      customerId
      threadId
      createdAt {
        unixTimestamp
        iso8601
      }
      updatedAt {
        unixTimestamp
        iso8601
      }
    }
  }
}

