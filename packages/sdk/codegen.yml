schema: ./src/schema.graphql
documents: ./src/_generated_documents.graphql
# Skip the OverlappingFieldsCanBeMerged validation rule. This rule incorrectly
# flags field conflicts between different concrete types in a union/interface
# (e.g. ComponentText.size: ComponentTextSize vs ComponentSpacer.size: ComponentSpacerSize).
# These fields can never coexist at runtime, so the conflicts are false positives.
config:
  skipDocumentsValidation:
    ignoreRules:
      - OverlappingFieldsCanBeMergedRule
generates:
  ./src/_generated_documents.ts:
    plugins:
      - typescript
      - typescript-operations
      - typed-document-node
    config:
      avoidOptionals: false
      enumsAsTypes: true
      nonOptionalTypename: false
      skipTypename: true
  ./src/_generated_sdk.ts:
    plugins:
      - "@team-plain/sdk-codegen-plugin"
