name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Determine base ref for schema diff
        id: base
        run: |
          # Use the latest version tag, or fall back to the initial commit
          TAG=$(git tag --list 'v*' --sort=-version:refname | head -n1)
          if [ -z "$TAG" ]; then
            TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "ref=$TAG" >> "$GITHUB_OUTPUT"

      - name: Summarize schema changes
        id: schema
        run: |
          SUMMARY=$(node scripts/summarize-schema-changes.mjs "${{ steps.base.outputs.ref }}")
          {
            echo "summary<<SCHEMA_EOF"
            echo "$SUMMARY"
            echo "SCHEMA_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create changeset
        run: |
          CHANGESET_ID=$(echo "${{ github.run_id }}-${{ github.run_attempt }}" | md5sum | head -c 12)
          cat > ".changeset/${CHANGESET_ID}.md" << 'EOF'
          ---
          "@team-plain/graphql-sdk": ${{ inputs.bump }}
          ---

          ${{ steps.schema.outputs.summary }}
          EOF
          # Fix leading whitespace from heredoc indentation
          sed -i 's/^          //' ".changeset/${CHANGESET_ID}.md"

      - name: Version packages
        run: pnpm changeset version

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: version @team-plain/graphql-sdk for release"
          title: "chore: release @team-plain/graphql-sdk"
          body: |
            This PR was auto-generated by the **Prepare Release** workflow.

            ## Schema Changes

            ${{ steps.schema.outputs.summary }}

            ---
            Merging this PR will trigger publishing to npm.
          branch: changeset-release/main
          labels: release
          delete-branch: true
